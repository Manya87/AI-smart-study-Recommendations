spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/studydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.example.demo=INFO

security.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hCYXNlNjRLZXlGb3JKV1QxMjM0NTY=}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.bootstrap.admin.email=${ADMIN_EMAIL:}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}
app.bootstrap.admin.phone-number=${ADMIN_PHONE_NUMBER:9999999999}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}